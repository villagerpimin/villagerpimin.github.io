<p>七秒钟的记忆<br>

相对以前更加感性了</p>
<p>尝试过改变自己 尝试过让自己成长<br>

<p>每次遇到别人问我问题 我就很尴尬<br>
我真不知道 我能说我忘记了吗<br>

具体 我也不知道自己学了什么<br>
混到现在 我都觉的很不可思议</p>
<p>写这篇文章的原因<br>
